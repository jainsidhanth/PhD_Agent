services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      MONGO_URL: "mongodb://mongo:27017"
      DB_NAME: "phd_outreach"
      CORS_ORIGINS: "*"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY}"
      CLAUDE_MODEL: "${CLAUDE_MODEL:-claude-sonnet-4-6}"
    ports:
      - "8001:8001"

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: "http://localhost:8001"
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  mongo_data:
