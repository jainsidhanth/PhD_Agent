services:
  - type: web
    name: phd-agent-backend
    env: docker
    plan: starter
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: MONGO_URL
        value: "mongodb+srv://<username>:<password>@<cluster>/<database>?retryWrites=true&w=majority"
      - key: DB_NAME
        value: "phd_agent"
      - key: ANTHROPIC_API_KEY
        value: ""
      - key: CORS_ORIGINS
        value: "https://jainsidhanth.github.io"
